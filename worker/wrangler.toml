name = "instareveal-qr-draw"
main = "src/index.js"
compatibility_date = "2023-10-01"

# Bind a KV namespace for session storage
[[kv_namespaces]]
binding = "INSTAREVEAL_SESSIONS" # This is the variable name used in your Worker script (e.g., env.INSTAREVEAL_SESSIONS)
id = "2a540634df9a41afb298caac04053282"  # Replace with the actual ID from Cloudflare Dashboard

# Bind an R2 bucket for prize images (optional)
[[r2_buckets]]
binding = "PRIZE_IMAGE_BUCKET" # This is the variable name used in your Worker script (e.g., env.PRIZE_IMAGE_BUCKET)
bucket_name = "prize-images" # Replace with the actual name from Cloudflare Dashboard

# Specify the directory for static assets (frontend files)
[assets]
directory = "../frontend/public"

# Environment variables for R2 public endpoint derivation
[vars]
CLOUDFLARE_ACCOUNT_ID = "6e90235e8b084448965e2f1afd51bb3a" # Replace with your actual Cloudflare Account ID
PRIZE_IMAGE_BUCKET_NAME = "prize-images" # Ensure this matches the bucket_name above
