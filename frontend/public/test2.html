<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jsQR Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            background-color: #f4f4f4;
        }
        #cameraPreview {
            width: 100%;
            max-width: 600px;
            border: 2px solid #333;
            background-color: black;
        }
        #output {
            margin-top: 20px;
            font-size: 1.2em;
            color: #333;
            word-break: break-all;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            margin-top: 10px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>jsQR Test Page</h1>
    <p>Click "Start Camera" and point your camera at a QR Code.</p>
    <button id="startButton">Start Camera</button>
    <video id="cameraPreview" autoplay playsinline></video>
    <p id="output">Scanning for QR Code...</p>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        const startButton = document.getElementById('startButton');
        const cameraPreview = document.getElementById('cameraPreview');
        const output = document.getElementById('output');
        let stream = null;
        let scanning = false;

        startButton.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                cameraPreview.srcObject = stream;
                startButton.style.display = 'none';
                output.textContent = 'Scanning for QR Code...';
                scanning = true;

                cameraPreview.onloadedmetadata = () => {
                    scanQRCode();
                };
            } catch (error) {
                console.error('Error accessing camera:', error);
                output.textContent = `Error: Failed to access camera. ${error.message}`;
                alert('Failed to access camera. Please grant permission and try again.');
            }
        });

        function scanQRCode() {
            if (!scanning) return;

            if (cameraPreview.readyState === cameraPreview.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = cameraPreview.videoWidth;
                canvas.height = cameraPreview.videoHeight;

                context.drawImage(cameraPreview, 0, 0, canvas.width, canvas.height);
                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);

                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: 'dontInvert'
                });

                console.log('jsQR result:', code);

                if (code) {
                    scanning = false;
                    output.textContent = `QR Code Detected: ${code.data}`;
                    // Stop camera after successful scan
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                        cameraPreview.srcObject = null;
                    }
                } else {
                    output.textContent = 'Scanning for QR Code...';
                    requestAnimationFrame(scanQRCode);
                }
            } else {
                // Video not ready yet, try again on next frame
                requestAnimationFrame(scanQRCode);
            }
        }
    </script>
</body>
</html>
